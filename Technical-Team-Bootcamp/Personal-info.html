<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <fieldset>
        <legend>Personal Information</legend>
        <form action="list.html" method="post">
            <label for="name">Password:</label><br>
            <input type="password" name="name" id="name"><br><br>

            <label for="address">Address:</label><br>
            <input type="text" name="address" id="address"><br><br>

            <label for="dob">DOB:</label><br>
            <input type="datetime-local" name="dob" id="dob"><br><br>

            <label for="mobile">Mobile No:</label><br>
            <input type="tel" name="mobile" id="mobile"><br><br>

            <label for="msg">Comment:</label><br>
            <textarea name="message" id="msg" rows="5"></textarea><br><br>

            <button type="submit">Submit</button>

        </form>
    </fieldset>
</body>
</html>
